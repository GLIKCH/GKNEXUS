<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GLIKCH NEXUZ Login</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050505;
        --panel: #10090a;
        --ink: #f5eeee;
        --muted: #b58b8f;
        --line: #43161b;
        --accent: {{ ui_settings.accent_colors[0] }};
        --accent-2: {{ ui_settings.accent_colors[3] }};
        --danger: #ff6b6b;
        --glow-strength: {{ ui_settings.glow_strength }};
        --border-strength: {{ ui_settings.border_strength }};
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: {% if ui_settings.login_position == 'left' %}center start{% elif ui_settings.login_position == 'right' %}center end{% elif ui_settings.login_position == 'top' %}start center{% elif ui_settings.login_position == 'bottom' %}end center{% else %}center{% endif %};
        padding: {% if ui_settings.login_position in ['left', 'right'] %}2rem 5vw{% elif ui_settings.login_position in ['top', 'bottom'] %}5vh 2rem{% else %}2rem{% endif %};
        background:
          linear-gradient(rgba(0, 0, 0, 0.26), rgba(0, 0, 0, 0.58)),
          url("{{ ui_settings.login_wallpaper }}") center / cover fixed no-repeat,
          var(--bg);
        color: var(--ink);
        font-family: Arial, sans-serif;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.03) 0, rgba(255, 255, 255, 0.03) 1px, transparent 1px, transparent 4px),
          radial-gradient(circle at 50% 50%, transparent, rgba(0, 0, 0, 0.42));
        opacity: 0.42;
      }

      main {
        width: min(420px, calc(100vw - 2rem));
        border: max(1px, calc(1px * var(--border-strength))) solid color-mix(in srgb, var(--accent), var(--line) 42%);
        border-radius: 10px;
        background: rgba(9, 5, 6, 0.7);
        padding: 1.25rem;
        box-shadow: 0 0 calc(34px * var(--glow-strength)) color-mix(in srgb, var(--accent-2), transparent 72%), inset 0 0 calc(24px * var(--glow-strength)) color-mix(in srgb, var(--accent), transparent 88%);
        backdrop-filter: blur(10px);
        position: relative;
        z-index: 1;
      }

      h1 { margin: 0 0 0.25rem; font-size: 1.2rem; }
      p { margin: 0 0 1rem; color: var(--muted); line-height: 1.45; }
      label { display: block; margin: 0.8rem 0 0.35rem; color: var(--muted); font-weight: 800; font-size: 0.86rem; }
      input {
        width: 100%;
        border: max(1px, calc(1px * var(--border-strength))) solid var(--line);
        border-radius: 6px;
        background: #070707;
        color: var(--ink);
        padding: 0.75rem;
        font: inherit;
      }

      button {
        width: 100%;
        margin-top: 1rem;
        border: max(1px, calc(1px * var(--border-strength))) solid var(--accent);
        border-radius: 6px;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        color: white;
        padding: 0.75rem;
        cursor: pointer;
        font: inherit;
        font-weight: 900;
      }

      .error {
        margin-top: 0.8rem;
        color: var(--danger);
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>GLIKCH NEXUZ</h1>
      <p>Authenticate to manage local LM Studio memory, imports, exports, and chat context.</p>
      <form method="post">
        <label for="username">Admin Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required />
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
        <button type="submit">Login</button>
      </form>
      {% if error_message %}
        <div class="error">{{ error_message }}</div>
      {% endif %}
    </main>
  </body>
</html>
